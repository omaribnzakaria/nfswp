<html>
    <head>
        <!--HTML file auto generated using EmulatorJS codehelper-->
        <style>
            body, html {
                margin: 0;
                padding: 0;
            }
        </style>
    </head>
    <body>
        <div style="width:100%;height:100%;max-width:100%">
            <div id="game"></div>
        </div>
            <script>
            // 1. Logic to stitch the files
            async function serveCombinedFile(urls) {
                const blobs = await Promise.all(urls.map(url => fetch(url).then(r => r.blob())));
                const finalBlob = new Blob(blobs, { type: 'application/octet-stream' });
                
                // Send to the Service Worker
                if (navigator.serviceWorker.controller) {
                    navigator.serviceWorker.controller.postMessage({
                        type: 'SET_BLOB',
                        filename: 'fullfile.bin',
                        blob: finalBlob
                    });
                }
                return true; // Done
            }

            // 2. Main initialization sequence
            async function start() {
                // Register the Service Worker
                if ('serviceWorker' in navigator) {
                    await navigator.serviceWorker.register('service-worker.js');
                    await navigator.serviceWorker.ready;
                }

                // Stitch the files
                await serveCombinedFile(['part_0', 'part_1', 'part_2', 'part_3', 'part_4', 'part_5']);

                // 3. NOW set the variables
            EJS_player = "#game";
            EJS_core = "psx";
            EJS_gameName = "mg1";
            EJS_color = "#0064ff";
            EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
            EJS_gameUrl = "fullfile.bin";
            EJS_biosUrl = "SCPH7001.bin";

                // 4. NOW inject the loader
                const script = document.createElement("script");
                script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
                document.body.appendChild(script);
            }

            start();
        </script>
    </body>
</html>
